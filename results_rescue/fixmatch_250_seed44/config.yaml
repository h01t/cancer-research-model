augmentation:
  mild_strong:
    brightness: 0.08
    contrast: 0.12
    random_horizontal_flip: true
    random_rotation: 8.0
    translate:
    - 0.05
    - 0.05
  weak:
    color_jitter: 0.0
    random_horizontal_flip: true
    random_rotation: 5
    random_vertical_flip: false
dataset:
  abnormality_type: mass
  data_dir: data
  image_size: 512
  labeled_subset_size: 250
experiment:
  seed: 44
logging:
  log_freq: 10
  save_freq: 10
model:
  dropout_rate: 0.2
  freeze_backbone: true
  freeze_backbone_epochs: 5
  name: efficientnet-b0
  num_classes: 2
  pretrained: true
ssl:
  confidence_threshold: 0.95
  confidence_threshold_end: 0.95
  confidence_threshold_ramp_epochs: 15
  confidence_threshold_start: 0.7
  distribution_alignment: false
  ema_decay: 0.999
  lambda_u: 1.0
  lambda_u_end: 1.0
  lambda_u_ramp_epochs: 20
  lambda_u_start: 0.0
  method: fixmatch
  randaugment_m: 10
  randaugment_n: 2
  unlabeled_batch_ratio: 2
  use_ema: true
training:
  batch_size: 8
  class_weighted_loss: true
  early_stopping_patience: 25
  gradient_clipping: true
  learning_rate: 0.001
  max_grad_norm: 1.0
  momentum: 0.9
  num_epochs: 150
  num_workers: 20
  optimizer: adam
  scheduler: cosine
  use_amp: true
  warmup_epochs: 5
  weight_decay: 0.0001
wandb:
  enabled: false
  project: ssl-mammography
  run_name: null
