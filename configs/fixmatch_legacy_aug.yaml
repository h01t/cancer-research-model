# FixMatch probe configuration with legacy-style augmentation and rescue schedules.

dataset:
  data_dir: "data"
  abnormality_type: "mass"
  image_size: 512
  labeled_subset_size: null

model:
  name: "efficientnet-b0"
  num_classes: 2
  pretrained: true
  dropout_rate: 0.2
  freeze_backbone: true
  freeze_backbone_epochs: 5

training:
  batch_size: 8
  num_epochs: 150
  learning_rate: 0.001
  weight_decay: 0.0001
  momentum: 0.9
  optimizer: "adam"
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping_patience: 25
  num_workers: 20
  use_amp: true
  gradient_clipping: true
  max_grad_norm: 1.0
  class_weighted_loss: true

ssl:
  method: "fixmatch"
  confidence_threshold: 0.95
  confidence_threshold_start: 0.70
  confidence_threshold_end: 0.95
  confidence_threshold_ramp_epochs: 15
  lambda_u: 1.0
  lambda_u_start: 0.0
  lambda_u_end: 1.0
  lambda_u_ramp_epochs: 20
  unlabeled_batch_ratio: 2
  randaugment_n: 2
  randaugment_m: 10
  use_ema: true
  ema_decay: 0.999
  distribution_alignment: false

augmentation:
  weak:
    random_horizontal_flip: true
    random_vertical_flip: true
    random_rotation: 5
    color_jitter: 0.1
  mild_strong:
    random_horizontal_flip: true
    random_rotation: 12.0
    translate: [0.1, 0.1]
    brightness: 0.12
    contrast: 0.18

logging:
  save_freq: 10
  log_freq: 10

wandb:
  enabled: false
  project: "ssl-mammography"
  run_name: null
