# FixMatch configuration — conservative, paper-aligned.
#
# Design principle: IDENTICAL base hyperparameters to default.yaml (supervised).
# The ONLY differences are the SSL-specific additions:
#   - More epochs + patience (pseudo-labels need time to stabilize)
#   - Confidence-thresholded pseudo-labels (tau=0.95, per FixMatch paper)
#   - EMA teacher for stable pseudo-label generation
#   - Strong augmentation (RandAugment) on unlabeled data
#
# This isolates the SSL effect cleanly for ablation comparison.

# Dataset
dataset:
  data_dir: "data"
  abnormality_type: "mass"  # mass, calc, both
  image_size: 512
  labeled_subset_size: null  # set via --labeled CLI arg

# Model — matches default.yaml exactly
model:
  name: "efficientnet-b0"
  num_classes: 2
  pretrained: true
  dropout_rate: 0.2            # same as supervised
  freeze_backbone: true        # same as supervised
  freeze_backbone_epochs: 5    # same as supervised

# Training — matches default.yaml except epochs/patience
training:
  batch_size: 8                # same as supervised
  num_epochs: 150              # more epochs: pseudo-labels need time to kick in
  learning_rate: 0.001         # same as supervised
  weight_decay: 0.0001         # same as supervised
  momentum: 0.9                # for SGD only
  optimizer: "adam"            # same as supervised
  scheduler: "cosine"          # same as supervised
  warmup_epochs: 5             # same as supervised
  early_stopping_patience: 25  # more patience: SSL convergence is slower
  num_workers: 20
  use_amp: true                # mixed precision training
  gradient_clipping: true
  max_grad_norm: 1.0
  class_weighted_loss: true    # same as supervised

# SSL (FixMatch) — paper defaults, no bells and whistles
ssl:
  method: "fixmatch"
  confidence_threshold: 0.95   # final tau target after ramp.
  confidence_threshold_start: 0.70
  confidence_threshold_end: 0.95
  confidence_threshold_ramp_epochs: 15
  lambda_u: 1.0                # final unsupervised weight target after ramp.
  lambda_u_start: 0.0
  lambda_u_end: 1.0
  lambda_u_ramp_epochs: 20
  unlabeled_batch_ratio: 2     # mu: fits 8GB VRAM at 512px
  randaugment_n: 2             # RandAugment: number of transforms
  randaugment_m: 10            # RandAugment: magnitude (0-30)
  use_ema: true                # EMA teacher for stable pseudo-labels
  ema_decay: 0.999             # standard EMA decay
  distribution_alignment: false # disabled for conservative baseline

# Data augmentation — matches default.yaml exactly
augmentation:
  weak:
    random_horizontal_flip: true
    random_vertical_flip: false
    random_rotation: 5         # degrees
    color_jitter: 0.0
  mild_strong:
    random_horizontal_flip: true
    random_rotation: 8.0
    translate: [0.05, 0.05]
    brightness: 0.08
    contrast: 0.12

# Logging and checkpoints (per-experiment, inside output_dir)
logging:
  save_freq: 10                # save checkpoint every N epochs
  log_freq: 10                 # log metrics every N batches

# Weights & Biases (optional)
wandb:
  enabled: false
  project: "ssl-mammography"
  run_name: null               # auto-generated if null

tensorboard:
  enabled: false
  log_dir: null
  flush_secs: 30
