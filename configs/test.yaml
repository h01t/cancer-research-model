# Quick validation configuration (fast, no GPU needed)
# Use for: pipeline testing, CI, environment validation

dataset:
  data_dir: "data"
  abnormality_type: "mass"
  image_size: 224  # smaller for speed
  labeled_subset_size: 10

model:
  name: "efficientnet-b0"
  num_classes: 2
  pretrained: false  # skip download for quick tests
  dropout_rate: 0.2
  freeze_backbone: false

training:
  batch_size: 4
  num_epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  momentum: 0.9
  optimizer: "adam"
  scheduler: "cosine"
  warmup_epochs: 0
  early_stopping_patience: 5
  num_workers: 0  # no multiprocessing for tests
  use_amp: false  # disable for CPU compatibility
  gradient_clipping: true
  max_grad_norm: 1.0
  class_weighted_loss: false

ssl:
  method: "fixmatch"
  confidence_threshold: 0.95
  confidence_threshold_start: 0.7
  confidence_threshold_end: 0.95
  confidence_threshold_ramp_epochs: 2
  lambda_u: 1.0
  lambda_u_start: 0.0
  lambda_u_end: 1.0
  lambda_u_ramp_epochs: 2
  unlabeled_batch_ratio: 2  # smaller for testing
  randaugment_n: 2
  randaugment_m: 10
  use_ema: false  # disable for speed
  ema_decay: 0.999

augmentation:
  weak:
    random_horizontal_flip: true
    random_vertical_flip: false
    random_rotation: 5
    color_jitter: 0.0
  mild_strong:
    random_horizontal_flip: true
    random_rotation: 8.0
    translate: [0.05, 0.05]
    brightness: 0.08
    contrast: 0.12

logging:
  save_freq: 1
  log_freq: 1

wandb:
  enabled: false
  project: "ssl-mammography"
  run_name: null

tensorboard:
  enabled: false
  log_dir: null
  flush_secs: 30
