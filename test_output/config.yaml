augmentation:
  strong:
    cutout: true
    cutout_size: 0.25
    randaugment: true
  weak:
    color_jitter: 0.1
    random_horizontal_flip: true
    random_rotation: 5
    random_vertical_flip: false
dataset:
  abnormality_type: mass
  data_dir: data
  image_size: 224
  labeled_subset_size: 10
  split: train
evaluation:
  metrics:
  - accuracy
  - auc
  - f1
  - precision
  - recall
  save_predictions: true
  test_split: test
logging:
  log_dir: logs/test
  log_freq: 1
  save_dir: checkpoints/test
  save_freq: 1
  use_tensorboard: false
model:
  dropout_rate: 0.2
  name: efficientnet-b0
  num_classes: 2
  pretrained: false
ssl:
  confidence_threshold: 0.95
  lambda_u: 1.0
  method: fixmatch
  randaugment_m: 10
  randaugment_n: 2
  strong_augmentation: randaugment
  unlabeled_batch_ratio: 7
  weak_augmentation: flip_shift
training:
  batch_size: 4
  early_stopping_patience: 5
  learning_rate: 0.001
  momentum: 0.9
  num_epochs: 2
  optimizer: adam
  scheduler: cosine
  warmup_epochs: 0
  weight_decay: 0.0001
